services:
  # Python Backend API Service
  - type: web
    name: ai-code-review-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-code-review-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production

  # React Frontend Static Hosting Site
  - type: web
    name: ai-code-review-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000

databases:
  # PostgreSQL Database Instance
  - name: ai-code-review-postgres
    plan: free
    databaseName: ai_code_review_db
    user: postgres

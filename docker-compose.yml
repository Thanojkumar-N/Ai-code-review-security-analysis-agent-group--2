version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: security_agent_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
      POSTGRES_DB: ai_code_review_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_code_review_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: security_agent_backend
    restart: always
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=postgresql://postgres:postgres_secure_pass@db:5432/ai_code_review_db
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass
      - POSTGRES_DB=ai_code_review_db
      - POSTGRES_PORT=5432
      - JWT_SECRET_KEY=45c08fa5efef4772b22bbcb9ef21516e91cb3cbb42a0b1b1a7d65b79658bd781
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - UPLOAD_DIR=uploads
      - REPORT_DIR=reports
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/workspace/uploads
      - ./reports:/workspace/reports
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: security_agent_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
